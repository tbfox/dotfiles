set-option -sa terminal-overrides ",xterm-256color:RGB"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tbfox/tmux-gruvbox'

set -g @tmux-gruvbox 'dark'
set -g @tmux-gruvbox-zoom-color 'true'

# Right status slots (a=leftmost, h=rightmost) — leave empty to hide
set -g @tmux-gruvbox-right-status-a '#(memory_pressure | grep "System-wide memory free percentage" | awk "{print 100-\$NF}" | xargs printf "RAM: %.0f%%")'
set -g @tmux-gruvbox-right-color-a 'col_purple'

set -g @tmux-gruvbox-right-status-b '#(top -l 1 -n 0 | grep "CPU usage" | awk "{print \"CPU: \" \$3}")'
set -g @tmux-gruvbox-right-color-b 'col_green'

set -g @tmux-gruvbox-right-status-c '%B %-d, %Y  %H:%M'
set -g @tmux-gruvbox-right-color-c 'col_blue'

set -g @tmux-gruvbox-right-status-d 'tbfox'
set -g @tmux-gruvbox-right-color-d 'col_orange'

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set -g default-terminal "tmux-256color"
set -g mouse on

source-file ~/.config/tmux/windows.tmux
source-file ~/.config/tmux/statusbar.tmux
source-file ~/.config/tmux/copy-mode.tmux
source-file ~/.config/tmux/nvim-navigator.tmux
source-file ~/.config/tmux/new-pane-current-path.tmux

run '~/.tmux/plugins/tpm/tpm'
run '~/.tmux/plugins/tmux-gruvbox/gruvbox-tpm.tmux'
